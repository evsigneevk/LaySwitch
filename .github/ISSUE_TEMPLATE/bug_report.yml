name: Bug Report
description: Something isn't working as expected
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Before submitting, check [existing issues](https://github.com/evsigneevk/LaySwitch/issues) to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Switch from app A (layout X) to app B
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: dropdown
    id: macos
    attributes:
      label: macOS version
      options:
        - macOS 15 Sequoia
        - macOS 26 (beta)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      description: |
        Paste relevant output from:
        ```
        log stream --predicate 'subsystem == "com.layswitch.app"' --level info
        ```
      render: text
