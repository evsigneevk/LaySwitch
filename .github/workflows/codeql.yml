name: CodeQL

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'LaySwitch/**'
      - 'LaySwitchTests/**'
      - 'Package.swift'

jobs:
  analyze:
    name: Static Analysis (Swift)
    runs-on: macos-15

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # CodeQL must be initialised before the build so it can instrument
      # the Swift compiler and trace the compilation.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift

      - name: Build (traced by CodeQL)
        run: swift build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
