name: CodeQL

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'LaySwitch/**'
      - 'LaySwitchTests/**'
      - 'project.yml'

jobs:
  analyze:
    name: Static Analysis (Swift)
    runs-on: macos-15

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # CodeQL must be initialised before the build so it can instrument
      # the Swift compiler and trace the compilation.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift

      - name: Install xcodegen
        run: brew install --quiet xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (traced by CodeQL)
        run: |
          xcodebuild build \
            -project LaySwitch.xcodeproj \
            -scheme LaySwitch \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
